<!DOCTYPE html>
<html>

  <head>
    <meta charset='utf-8' />
    <title>University of Oregon Mapping</title>
    <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
    <!--    Include the reference to the Mapbox JavaScript here in the <head> of the page  (Part I.1)  -->
    
    <script src="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.js"></script>
          
    <!--    Include the reference to the Mapbox CSS here in between <head> tags    (Part I.2) -->
    
    <link href="https://api.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css" rel="stylesheet">
    <style>
        /* Insert the additional CSS code here between the <style> tags  (Part I.4)   */
        
      body { margin:0; padding:0; }
      #map { position:absolute; top:0; bottom:0; width:100%; }

      #banner { z-index: 9999; 
         background-color:lightblue; 
         opacity: 100%; 
         text-align: left;
         color: whitesmoke;
         position: relative
     }

    </style>
  </head>

  <body>
    <!--  Insert the map div here in the <body> of the page  (Part I)  -->
    <div id='map'></div>
     <div id='banner'>
     		<h1>My Map of Eugene, Oregon</h1>
     		<h2>By: Isabel Dalisay</h2>
 	    </div>

     
    <!--  Insert the title div here (part VI) -->
    <div id='title'></div>
    <script>
        // Insert the JavaScript within the <script> tags, within the body   
        // Start with the Mapbox access token here (Part 2.1)
      
          mapboxgl.accessToken = 'pk.eyJ1IjoiaXNhZGFsaSIsImEiOiJjbW5pMDEwZWEwODFmMnBwcG50aTZ0Y2F4In0.CWgFWJLdW0XP0RIF-OGg-w'
        // Then initialize the map here (Part 2.2)
           var map = new mapboxgl.Map({
            container: 'map', // id of a div on your page, where the map will be inserted
            style: 'mapbox://styles/mapbox/standard-satellite', // stylesheet location
            center: [-123.07362531969055, 44.045054389481216], // starting position [lng, lat] eg. [-122.6788, 45.5212]
            zoom: 15 // starting zoom 
            });

            map.addControl(new mapboxgl.NavigationControl({
              showCompass: false
            }), 'bottom-left');
        // Add the zoom contols here (part V)
   
        // Add popups for markers here. Yes, before the markers!  (part IV)
         var popup = new mapboxgl.Popup()
        .setHTML('Classroom!');

        var popup_layer_classroom = new mapboxgl.Popup({
       closeOnClick: true, anchor: 'top-left'
        })
        .setLngLat([-123.07789206139678, 44.047143946925154])
        .setHTML('<a href="https://catalog.uoregon.edu/courses/crs-geog/">classroom</a>')
        .addTo(map);

        // Add any other variables such as markers here (part III)

         var marker = new mapboxgl.Marker({color:'purple'})
        .setLngLat([-123.0782353594447, 44.047197824413914, ]) // starting position [lng, lat] 
        .addTo(map);

        var marker = new mapboxgl.Marker({color:'green'})
        .setLngLat([-123.07258403881056, 44.04501525193757]) // starting position [lng, lat] 
        .addTo(map);

        // Add optional advanced "On load" function here
        
    </script>

  </body>

</html>
