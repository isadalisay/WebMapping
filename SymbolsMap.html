<!DOCTYPE html>
<html>

  <head>
    <meta charset='utf-8' />
    <title>Symbols Map</title>
    <meta name='viewport' content='initial-scale=1,maximum-scale=1,user-scalable=no' />
    <!--    Include the reference to the Mapbox JavaScript here in the <head> of the page -->
    
    <script src='https://api.tiles.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.js'></script>
          
    <!--    Include the reference to the Mapbox CSS here in between <head> tags  -->
    
    <link href='https://api.tiles.mapbox.com/mapbox-gl-js/v3.20.0/mapbox-gl.css' rel='stylesheet' />    <style>
        /* Insert the additional CSS code here between the <style> tags  */
        
      body { margin:0; padding:0; }
      #map { position:absolute; top: 0; bottom: 0; width:100%; } /* add styling */

      #banner { z-index: 9999; 
         background-color:lightgrey; 
         opacity: 100%; 
         text-align: left;
         color: black;
         position: relative
     }

    </style>
  </head>

  <body>
    <!--  Insert the map div here in the <body> of the page  -->
    <div id='map'></div>

    <div id='banner'>
     		<h1>Colorado Mountain Summits by County</h1>
 	  </div>

    <!--  Insert the title div here-->
    <div id='title'></div>
    <script>
          mapboxgl.accessToken = 'pk.eyJ1IjoiaXNhZGFsaSIsImEiOiJjbW5pMDEwZWEwODFmMnBwcG50aTZ0Y2F4In0.CWgFWJLdW0XP0RIF-OGg-w'
        // initialize the map 
           var map = new mapboxgl.Map({
            container: 'map', // id of a div on your page, where the map will be inserted
            style: 'mapbox://styles/isadali/cmohvrwuj000201st2eae03zl', // stylesheet location
            center: [-105.72320374284182, 40.33694797094234], 
            zoom: 9.75
            });

            map.addControl(new mapboxgl.NavigationControl({
              showCompass: false
            }), 'bottom-left');
        
    </script>

  </body>

</html>
